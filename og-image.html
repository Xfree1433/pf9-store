<!-- Screenshot this at 1200x630 to create og-image.png -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #111;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .container {
    text-align: center;
    padding: 2rem;
  }
  .badge {
    display: inline-block;
    background: #fff;
    color: #111;
    padding: 0.5rem 1.5rem;
    border-radius: 8px;
    font-weight: 800;
    font-size: 2.5rem;
    letter-spacing: 0.05em;
    margin-bottom: 2rem;
  }
  h1 {
    font-size: 3rem;
    font-weight: 700;
    margin-bottom: 1rem;
    line-height: 1.2;
  }
  p {
    font-size: 1.5rem;
    color: #9ca3af;
    max-width: 800px;
    margin: 0 auto 2.5rem;
    line-height: 1.5;
  }
  .apps {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: center;
    max-width: 900px;
    margin: 0 auto;
  }
  .app {
    background: rgba(255,255,255,0.1);
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="badge">PF9</div>
  <h1>Plainspoken Foundry Nine</h1>
  <p>Software That Works As Hard As You Do</p>
  <div class="apps">
    <span class="app">FLOWTRACK</span>
    <span class="app">QUALIFI</span>
    <span class="app">SHIFTLOG</span>
    <span class="app">REPORTR</span>
    <span class="app">INSPECTR</span>
    <span class="app">LANDLORDR</span>
    <span class="app">TENANTLINK</span>
    <span class="app">PERMITR</span>
    <span class="app">TASKFLOW</span>
  </div>
</div>
</body>
</html>
